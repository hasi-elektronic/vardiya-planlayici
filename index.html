<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vardiya Planlayıcı</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#141a24;--ink2:#5a6472;--ink3:#8a94a4;--line:#e6eaf0;--line2:#f0f3f7;--bg:#f4f6f9;--panel:#fff;--panel2:#fafbfc;
  --accent:#4f46e5;--accent2:#33afe2;--accent-soft:#eef0fd;--warn:#d64545;--warn-soft:#fdf1f0;--wknd:#f9f6ef;--ok:#1f9254;
  --sab-bg:#dcf3e4;--sab-tx:#137a42;--sab-ac:#28a35f;
  --ogl-bg:#fde7cf;--ogl-tx:#a4600f;--ogl-ac:#e08a2b;
  --gec-bg:#d8e6fc;--gec-tx:#1c4f92;--gec-ac:#3d7ad6;
  --off-bg:#eceef2;--off-tx:#7a8594;--off-ac:#c2cad6;
  --shadow:0 1px 2px rgba(20,26,36,.04),0 6px 20px rgba(20,26,36,.05);
  --shadow-lg:0 20px 60px rgba(20,26,36,.22);
}
[data-theme="dark"]{
  --ink:#e8ecf3;--ink2:#9aa5b5;--ink3:#6b7686;--line:#28303c;--line2:#222a35;--bg:#0f141b;--panel:#161d27;--panel2:#1b232f;
  --accent:#7c74f0;--accent2:#4fbef0;--accent-soft:#232a4a;--warn:#f0736f;--warn-soft:#2a1c1e;--wknd:#1a1d20;--ok:#4ec988;
  --sab-bg:#153726;--sab-tx:#5cd896;--sab-ac:#2e8f5b;
  --ogl-bg:#3a2a12;--ogl-tx:#f0b56e;--ogl-ac:#c07f28;
  --gec-bg:#172b47;--gec-tx:#7db3f0;--gec-ac:#3a6cb0;
  --off-bg:#232a35;--off-tx:#8892a2;--off-ac:#3a4453;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
  --shadow-lg:0 20px 60px rgba(0,0,0,.6);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg);font-size:13px;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
header{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 18px;position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent) 55%,transparent)}
.logo{display:flex;align-items:center;gap:10px}
.logomark{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:22px;height:22px;flex:none}
.logomark i{border-radius:3px}
.logomark i:nth-child(1){background:var(--sab-ac)}.logomark i:nth-child(2){background:var(--ogl-ac)}
.logomark i:nth-child(3){background:var(--gec-ac)}.logomark i:nth-child(4){background:var(--off-ac)}
.brand{display:flex;flex-direction:column;line-height:1.15}
.brand b{font-size:15px;letter-spacing:-.015em;font-weight:800}
.brand span{font-size:11px;color:var(--ink2)}
.month-nav{display:flex;align-items:center;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:2px}
.month-nav .m{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:13.5px;min-width:130px;text-align:center}
button{font-family:inherit;font-size:12.5px;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 12px;border-radius:9px;cursor:pointer;font-weight:500;transition:.14s;display:inline-flex;align-items:center;gap:6px}
button:hover{border-color:var(--ink3);background:var(--panel2);transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.primary{background:linear-gradient(135deg,var(--accent),#6d63f0);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.3)}
button.primary:hover{filter:brightness(1.08);box-shadow:0 4px 14px rgba(79,70,229,.4)}
button.icon{padding:7px 9px}
.month-nav button{border:none;background:transparent;padding:5px 9px}
.month-nav button:hover{background:var(--line2);transform:none}
.spacer{flex:1}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.saved{font-size:11px;color:var(--ink2);display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px color-mix(in srgb,var(--ok) 20%,transparent)}
.wrap{padding:16px 18px 60px;max-width:1600px;margin:0 auto}
.bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:14px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);transition:.2s;position:relative;overflow:hidden}
.stat:hover{transform:translateY(-2px)}
.stat .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:17px;flex:none;background:var(--accent-soft);color:var(--accent)}
.stat.t-hours .ic{background:var(--sab-bg);color:var(--sab-tx)}
.stat.t-cost .ic{background:var(--ogl-bg);color:var(--ogl-tx)}
.stat.t-warn .ic{background:var(--warn-soft);color:var(--warn)}
.stat.t-ok .ic{background:var(--sab-bg);color:var(--sab-tx)}
.stat .tx{display:flex;flex-direction:column;gap:1px;min-width:0}
.stat .tx b{font-family:"JetBrains Mono",monospace;font-size:19px;font-weight:700;line-height:1}
.stat .tx span{font-size:10px;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.gridbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:auto;max-height:calc(100vh - 300px);position:relative;box-shadow:var(--shadow)}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}
th,td{border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:0;text-align:center;white-space:nowrap}
thead th{position:sticky;top:0;background:var(--panel);z-index:20;font-weight:600;color:var(--ink2)}
thead .dnum{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);padding:7px 0 1px;font-weight:600}
thead .dname{font-size:9px;color:var(--ink3);padding:0 0 6px;font-weight:600;letter-spacing:.03em}
th.day,td.day{width:76px;min-width:76px}
.wkndcol{background:var(--wknd)}
thead .wkndcol .dname{color:var(--ogl-ac)}
.namecol{position:sticky;left:0;z-index:30;background:var(--panel);text-align:left;padding:5px 12px;font-weight:600;min-width:158px;box-shadow:1px 0 0 var(--line)}
thead .namecol{z-index:35;vertical-align:middle}
tbody tr{height:38px;transition:background .1s}
tbody tr:hover .namecol{background:var(--panel2)}
tbody .namecol{font-size:12.5px}
.nmline{display:flex;align-items:center;gap:6px}
.nn{font-size:8.5px;color:var(--gec-tx);font-weight:800;background:var(--gec-bg);border-radius:4px;padding:1px 4px;letter-spacing:.02em}
.distbar{display:flex;height:4px;border-radius:3px;overflow:hidden;margin-top:5px;background:var(--line2);width:130px}
.distbar i{height:100%}
.distbar .s{background:var(--sab-ac)}.distbar .o{background:var(--ogl-ac)}.distbar .g{background:var(--gec-ac)}.distbar .f{background:var(--off-ac)}
.cell{cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;height:38px;user-select:none;transition:.12s;position:relative}
.cell:hover{outline:2px solid var(--accent);outline-offset:-2px;z-index:5;filter:brightness(.97)}
.c-S{background:var(--sab-bg);color:var(--sab-tx);box-shadow:inset 3px 0 0 var(--sab-ac)}
.c-O{background:var(--ogl-bg);color:var(--ogl-tx);box-shadow:inset 3px 0 0 var(--ogl-ac)}
.c-G{background:var(--gec-bg);color:var(--gec-tx);box-shadow:inset 3px 0 0 var(--gec-ac)}
.c-off{background:var(--off-bg);color:var(--off-tx);font-weight:700;font-size:10px}
.cell.warn::after{content:"";position:absolute;top:3px;right:3px;width:0;height:0;border-top:8px solid var(--warn);border-left:8px solid transparent}
.sumcol{position:sticky;background:var(--panel);z-index:22;min-width:56px;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12.5px}
tbody tr:hover .sumcol{background:var(--panel2)}
.sumcol.net{color:var(--sab-tx)}
.sumhead{font-size:9px;color:var(--ink2);font-weight:700;padding:5px 3px;text-transform:uppercase}
tfoot td{background:var(--panel2);height:30px;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700}
tfoot .namecol{background:var(--panel2);font-family:Inter;font-weight:700;font-size:10.5px;color:var(--ink2)}
.covchip{display:inline-grid;place-items:center;width:26px;height:20px;border-radius:6px;font-size:11px;font-weight:700;margin:0 auto}
.cov-exact{background:var(--sab-bg);color:var(--sab-tx)}
.cov-under{background:var(--warn-soft);color:var(--warn)}
.cov-over{background:var(--ogl-bg);color:var(--ogl-tx)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-top:16px;padding:16px 18px;box-shadow:var(--shadow)}
.panel h3{margin:0 0 12px;font-size:13.5px;display:flex;align-items:center;gap:8px;font-weight:700}
.badge{background:var(--accent-soft);color:var(--accent);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
.badge.zero{background:color-mix(in srgb,var(--ok) 15%,transparent);color:var(--ok)}
.warnlist{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow:auto}
.warnrow{display:flex;gap:10px;align-items:center;font-size:12px;padding:8px 10px;border-radius:9px;background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 15%,transparent)}
.warnrow .wic{color:var(--warn);font-weight:800;flex:none}
.warnrow b{color:var(--warn);font-weight:700;min-width:120px}
.warnrow.ok{background:color-mix(in srgb,var(--ok) 10%,transparent);border-color:color-mix(in srgb,var(--ok) 20%,transparent);color:var(--ok)}
.warnrow.ok .wic{color:var(--ok)}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.legend span{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2);background:var(--panel2);border:1px solid var(--line);padding:4px 10px;border-radius:20px;font-weight:500}
.sw{width:12px;height:12px;border-radius:4px;display:inline-block}
.cfg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.cfg label{font-size:10px;color:var(--ink2);font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
.cfg input{font-family:"JetBrains Mono",monospace;width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:12.5px;background:var(--panel2);color:var(--ink);transition:.14s}
.cfg input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.stafftbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.stafftbl th{text-align:left;color:var(--ink2);font-size:10px;text-transform:uppercase;padding:5px 8px;border-bottom:1px solid var(--line);letter-spacing:.03em;font-weight:700}
.stafftbl td{padding:4px 8px;border-bottom:1px solid var(--line2)}
.stafftbl input[type=number]{width:74px;font-family:"JetBrains Mono",monospace;padding:5px 7px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);color:var(--ink)}
.stafftbl input[type=text]{width:130px;padding:5px 7px;border:1px solid var(--line);border-radius:7px;font-weight:600;background:var(--panel2);color:var(--ink)}
.stafftbl input:focus{outline:none;border-color:var(--accent)}
.stafftbl button{padding:4px 9px;font-size:11px}
.details{margin-top:16px}
summary{cursor:pointer;font-weight:700;font-size:13.5px;padding:6px 0;user-select:none;list-style:none;display:flex;align-items:center;gap:8px}
summary::before{content:"▸";color:var(--ink3);transition:.15s;font-size:11px}
details[open] summary::before{transform:rotate(90deg)}
.overlay{position:fixed;inset:0;background:rgba(10,14,20,.4);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.on{display:flex}
.editor{background:var(--panel);border-radius:16px;box-shadow:var(--shadow-lg);width:340px;max-width:92vw;padding:20px;animation:pop .16s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.editor h4{margin:0 0 2px;font-size:15px;font-weight:700}
.editor .who{color:var(--ink2);font-size:12px;margin-bottom:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:"JetBrains Mono",monospace;font-size:11.5px;font-weight:600;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);cursor:pointer;flex:1;text-align:center;min-width:120px;line-height:1.5;transition:.14s}
.chip:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.chip.S{background:var(--sab-bg);color:var(--sab-tx);border-color:transparent}
.chip.O{background:var(--ogl-bg);color:var(--ogl-tx);border-color:transparent}
.chip.G{background:var(--gec-bg);color:var(--gec-tx);border-color:transparent}
.chip.off{background:var(--off-bg);color:var(--off-tx);border-color:transparent}
.ed-actions{display:flex;gap:8px;margin-top:16px}
.ed-actions button{flex:1;justify-content:center}
.hasi-badge{position:fixed;right:14px;bottom:14px;z-index:30;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 12px 5px 8px;font-size:11px;color:var(--ink2);text-decoration:none;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow);transition:.16s}
.hasi-badge:hover{transform:translateY(-2px);border-color:var(--accent2)}
.hasi-badge b{color:var(--accent2);font-weight:800;letter-spacing:-.01em}
.hasi-badge .hi{width:14px;height:14px;border-radius:4px;background:var(--accent2)}
@media(max-width:640px){header{padding:9px 11px;gap:9px}.wrap{padding:10px 11px 40px}.actions button span{display:none}.brand span{display:none}.hasi-badge{display:none}}
@media print{header .actions,.panel,.overlay,.bar,.hasi-badge{display:none!important}.gridbox{max-height:none;border:none;overflow:visible;box-shadow:none}body{background:#fff}header::after{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logomark"><i></i><i></i><i></i><i></i></div>
    <div class="brand"><b>Vardiya Planlayıcı</b><span>3 vardiya · otomatik plan · kural denetimi</span></div>
  </div>
  <div class="month-nav">
    <button onclick="shiftMonth(-1)">&#8249;</button>
    <div class="m mono" id="monthLabel">—</div>
    <button onclick="shiftMonth(1)">&#8250;</button>
  </div>
  <div class="spacer"></div>
  <div class="actions">
    <button class="primary" onclick="doGenerate()">&#9889;<span>Otomatik Üret</span></button>
    <button onclick="clearMonth()">Temizle</button>
    <button onclick="exportXlsx()">&#8595;<span>Excel</span></button>
    <button onclick="window.print()">&#128424;<span>Yazdır</span></button>
    <button class="icon" id="themeBtn" onclick="toggleTheme()" title="Tema">&#127769;</button>
    <div class="saved"><span class="dot"></span><span id="savedTxt">kayıtlı</span></div>
  </div>
</header>
<div class="wrap">
  <div class="bar" id="statbar"></div>
  <div class="gridbox"><table id="grid"></table></div>

  <div class="panel">
    <h3>Kural Uyarıları <span class="badge" id="warnBadge">0</span></h3>
    <div class="warnlist" id="warnList"></div>
    <div class="legend">
      <span><i class="sw" style="background:var(--sab-ac)"></i>Sabah 07-15</span>
      <span><i class="sw" style="background:var(--ogl-ac)"></i>Öğlen 15-23</span>
      <span><i class="sw" style="background:var(--gec-ac)"></i>Gece 23-07</span>
      <span><i class="sw" style="background:var(--off-ac)"></i>İzin</span>
      <span>&#9650; Kural ihlali</span>
    </div>
  </div>

  <div class="panel">
    <details class="details" open>
      <summary>Ayarlar &amp; Personel</summary>
      <div class="cfg" style="margin-top:14px">
        <div><label>Sabah kişi</label><input type="number" id="cfgNS" min="0"></div>
        <div><label>Öğlen kişi</label><input type="number" id="cfgNO" min="0"></div>
        <div><label>Gece kişi</label><input type="number" id="cfgNG" min="0"></div>
        <div><label>Mola (dk)</label><input type="number" id="cfgBreak" min="0"></div>
        <div><label>Min. dinlenme (saat)</label><input type="number" id="cfgRest" min="0"></div>
        <div><label>Max ardışık gün</label><input type="number" id="cfgStreak" min="1"></div>
        <div><label>Haftalık max (saat)</label><input type="number" id="cfgWeekly" min="0"></div>
        <div><label>Saat ücreti € (genel)</label><input type="number" id="cfgRate" min="0" step="0.5"></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px"><button class="primary" onclick="saveCfg()">Ayarları Kaydet</button><button onclick="addStaff()">+ Personel</button></div>
      <table class="stafftbl" id="staffTbl"></table>
      <div style="font-size:11px;color:var(--ink2);margin-top:8px">Gece ✓ kapalı = o personel gece vardiyasına atanmaz. Ücret boşsa genel ücret kullanılır.</div>
    </details>
  </div>
</div>

<a class="hasi-badge" href="https://hasi-elektronic.de" target="_blank" rel="noopener"><span class="hi"></span>by <b>Hasi Elektronic</b></a>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeEd()">
  <div class="editor" id="editor"></div>
</div>

<script>
const TRDAY=["PAZAR","PZT","SALI","ÇAR","PERŞ","CUMA","CMTS"];
const MONTHS=["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
const SEED_NAMES=["ESENGÜL","ALİ","HÜSEYİN","SEVHAN","OĞUZHAN","TESLİME","MERVE","ŞERİFE","DİLEK","ALİ KEMAL","MEHMET","MUSTAFA","TUĞBA","ÖZGE","NİSA","ESMA","ESRA","HATİCE","GÜLSÜM","RECEP AVCI"];
const DEFAULT_CFG={ns:6,no:6,ng:3,breakMin:30,rest:11,streak:6,weekly:48,rate:0,
  shifts:[{key:"S",label:"Sabah",start:"07:00",end:"15:00"},{key:"O",label:"Öğlen",start:"15:00",end:"23:00"},{key:"G",label:"Gece",start:"23:00",end:"07:00"}]};

let store, key, year, month, staff, cfg;
let mem={};
function sGet(k){try{return localStorage.getItem(k)}catch(e){return mem[k]||null}}
function sSet(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}
let savedT;
function flashSaved(){const t=document.getElementById("savedTxt");if(!t)return;t.textContent="kaydedildi";clearTimeout(savedT);savedT=setTimeout(()=>t.textContent="kayıtlı",1200)}

function toggleTheme(){const cur=document.documentElement.getAttribute("data-theme");const nx=cur==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",nx);document.getElementById("themeBtn").innerHTML=nx==="dark"?"&#9728;":"&#127769;";sSet("vardiya_theme",nx)}
function initTheme(){const t=sGet("vardiya_theme")||"light";document.documentElement.setAttribute("data-theme",t);const b=document.getElementById("themeBtn");if(b)b.innerHTML=t==="dark"?"&#9728;":"&#127769;"}

function load(){
  try{store=JSON.parse(sGet("vardiya_adv"))||{}}catch(e){store={}}
  cfg=store.cfg?Object.assign({},DEFAULT_CFG,store.cfg):JSON.parse(JSON.stringify(DEFAULT_CFG));
  if(!store.staff) store.staff=SEED_NAMES.map(n=>({name:n,noNight:false,rate:null}));
  year=2026; month=7;
  initTheme();
  setMonth(year,month,true);
}
function persist(){store.cfg=cfg;store.staff=staff;store.months=store.months||{};store.months[key]=plan();sSet("vardiya_adv",JSON.stringify(store));flashSaved()}
function plan(){const o={};staff.forEach(s=>o[s.name]=s._days);return o}
function daysInMonth(y,m){return new Date(y,m,0).getDate()}

function setMonth(y,m,autogen){
  year=y;month=m;key=y+"-"+m;const dim=daysInMonth(y,m);
  staff=(store.staff||[]).map(s=>Object.assign({},s));
  const saved=(store.months||{})[key]||{};
  let empty=true;
  staff.forEach(s=>{let d=saved[s.name];if(!d){d=Array(dim).fill("")}else{d=d.slice();while(d.length<dim)d.push("");d.length=dim;if(d.some(x=>x))empty=false}s._days=d});
  document.getElementById("monthLabel").textContent=MONTHS[m-1]+" "+y;
  if(empty&&autogen){generate()}
  render();syncCfgInputs();
}
function shiftMonth(d){let m=month+d,y=year;if(m<1){m=12;y--}if(m>12){m=1;y++}
  store.months=store.months||{};store.months[key]=plan();sSet("vardiya_adv",JSON.stringify(store));
  setMonth(y,m,true)}

function pmin(hhmm){const[h,m]=hhmm.split(":").map(Number);return h*60+(m||0)}
function shiftByVal(v){for(const sh of cfg.shifts){if(v===sh.start+"-"+sh.end)return sh}return null}
function grossHours(v){const sh=shiftByVal(v);if(!sh)return 0;let s=pmin(sh.start),e=pmin(sh.end);if(e<=s)e+=1440;return (e-s)/60}
function netHours(v){const g=grossHours(v);if(!g)return 0;return g-(g>6?cfg.breakMin/60:0)}
function restBetween(prevSh,nextSh){let pe=pmin(prevSh.end);if(pe<=pmin(prevSh.start))pe+=1440;const ns=1440+pmin(nextSh.start);return (ns-pe)/60}

function generate(){
  const dim=daysInMonth(year,month);
  const S=cfg.shifts.map(sh=>Object.assign({need: sh.key==="S"?cfg.ns: sh.key==="O"?cfg.no: sh.key==="G"?cfg.ng:0},sh));
  staff.forEach(s=>s._days=Array(dim).fill(""));
  const st={};staff.forEach(s=>st[s.name]={last:null,streak:0,tot:0,g:0});
  const elig=(s,sh)=>{
    const t=st[s.name];
    if(t.streak>=cfg.streak)return false;
    if(sh.key==="G"&&s.noNight)return false;
    if(t.last===null)return true;
    const prev=S.find(x=>x.key===t.last);
    return restBetween(prev,sh)>=cfg.rest;
  };
  const score=(s,sh)=>{const t=st[s.name];let v=t.tot+t.streak*2.2;if(sh.key==="G")v+=t.g*3;return v+Math.random()*0.05};
  for(let di=0;di<dim;di++){
    const assigned={};
    for(const sh of S){
      let pool=staff.filter(s=>!(s.name in assigned)&&elig(s,sh));
      pool.sort((a,b)=>score(a,sh)-score(b,sh));
      const take=pool.slice(0,sh.need);
      if(take.length<sh.need)return {ok:false,day:di+1,shift:sh.label,got:take.length};
      take.forEach(s=>assigned[s.name]=sh.key);
    }
    staff.forEach(s=>{
      if(s.name in assigned){const k=assigned[s.name];const sh=S.find(x=>x.key===k);s._days[di]=sh.start+"-"+sh.end;const t=st[s.name];t.last=k;t.streak++;t.tot++;if(k==="G")t.g++}
      else{s._days[di]="İZİN";st[s.name].last=null;st[s.name].streak=0}
    });
  }
  return {ok:true};
}
function doGenerate(){
  const r=generate();
  if(!r.ok){alert("Üretilemedi: "+r.day+". gün "+r.shift+" vardiyası dolmadı ("+r.got+" kişi). Kadro sayısını veya 'gece yapamaz' kısıtlarını gözden geçir.");render();return}
  persist();render();
}
function clearMonth(){if(!confirm("Bu ayın planı silinsin mi?"))return;const dim=daysInMonth(year,month);staff.forEach(s=>s._days=Array(dim).fill(""));persist();render()}

function warnings(){
  const W=[],cw={};const dim=daysInMonth(year,month);
  staff.forEach((s,si)=>{
    let streak=0;
    for(let i=0;i<dim;i++){
      const v=s._days[i],sh=shiftByVal(v);
      if(sh){streak++;if(streak>cfg.streak){W.push({who:s.name,day:i+1,msg:streak+" gün arka arkaya izinsiz"});cw[si+"_"+i]=1}}
      else if(v==="İZİN"||v===""){streak=0}
    }
    for(let i=0;i<dim-1;i++){
      const a=shiftByVal(s._days[i]),b=shiftByVal(s._days[i+1]);
      if(a&&b){const r=restBetween(a,b);if(r<cfg.rest){W.push({who:s.name,day:i+2,msg:"dinlenme "+r.toFixed(1)+"s (<"+cfg.rest+"s)"});cw[si+"_"+(i+1)]=1}}
    }
    let wk=0;
    for(let i=0;i<dim;i++){const dow=new Date(year,month-1,i+1).getDay();if(dow===1)wk=0;wk+=netHours(s._days[i]);
      const nd=i+1<dim?new Date(year,month-1,i+2).getDay():-1;
      if((nd===1||i===dim-1)&&wk>cfg.weekly)W.push({who:s.name,day:i+1,msg:"haftalık "+wk.toFixed(1)+"s net (>"+cfg.weekly+"s)"})}
  });
  for(let i=0;i<dim;i++){
    const c={S:0,O:0,G:0};staff.forEach(s=>{const sh=shiftByVal(s._days[i]);if(sh&&c[sh.key]!=null)c[sh.key]++});
    if(c.S!==cfg.ns)W.push({who:"KADRO",day:i+1,msg:"Sabah "+c.S+"/"+cfg.ns});
    if(c.O!==cfg.no)W.push({who:"KADRO",day:i+1,msg:"Öğlen "+c.O+"/"+cfg.no});
    if(c.G!==cfg.ng)W.push({who:"KADRO",day:i+1,msg:"Gece "+c.G+"/"+cfg.ng});
  }
  return {W,cw};
}

function personStats(s){let sh={S:0,O:0,G:0},tot=0,net=0;const dim=daysInMonth(year,month);
  for(let i=0;i<dim;i++){const x=shiftByVal(s._days[i]);if(x){sh[x.key]++;tot++;net+=netHours(s._days[i])}}
  const rate=(s.rate!=null&&s.rate!=="")?+s.rate:+cfg.rate;
  return {sh,tot,net:Math.round(net*10)/10,cost:Math.round(net*rate)}}

function render(){
  const dim=daysInMonth(year,month);const {W,cw}=warnings();
  let totNet=0,totCost=0,totShift=0;staff.forEach(s=>{const p=personStats(s);totNet+=p.net;totCost+=p.cost;totShift+=p.tot});
  const rate=+cfg.rate;
  document.getElementById("statbar").innerHTML=
    stat("&#128101;",staff.length,"personel","")+
    stat("&#128197;",totShift,"vardiya / ay","")+
    stat("&#9201;",totNet.toFixed(0)+"s","net işgücü","t-hours")+
    (rate>0?stat("&#128176;",totCost.toLocaleString("tr")+" €","aylık işçilik","t-cost"):"")+
    stat(W.length?"&#9888;":"&#10003;",W.length,"kural uyarısı",W.length?"t-warn":"t-ok");
  let h="<thead><tr><th class='namecol'>Personel</th>";
  for(let d=1;d<=dim;d++){const dow=new Date(year,month-1,d).getDay();const wk=(dow===0||dow===6)?" wkndcol":"";
    h+="<th class='day"+wk+"'><div class='dnum'>"+d+"</div><div class='dname'>"+TRDAY[dow]+"</div></th>"}
  h+="<th class='sumcol sumhead' style='right:112px'>NET s</th><th class='sumcol sumhead' style='right:56px'>Vard.</th><th class='sumcol sumhead' style='right:0'>&euro;</th></tr></thead><tbody>";
  staff.forEach((s,si)=>{
    const p=personStats(s);const off=dim-p.tot;const pc=x=>dim?(x/dim*100).toFixed(2):0;
    const bar="<div class='distbar'><i class='s' style='width:"+pc(p.sh.S)+"%'></i><i class='o' style='width:"+pc(p.sh.O)+"%'></i><i class='g' style='width:"+pc(p.sh.G)+"%'></i><i class='f' style='width:"+pc(off)+"%'></i></div>";
    h+="<tr><td class='namecol'><div class='nmline'>"+esc(s.name)+(s.noNight?"<span class='nn'>gece✕</span>":"")+"</div>"+bar+"</td>";
    for(let d=0;d<dim;d++){const v=s._days[d];const sh=shiftByVal(v);const dow=new Date(year,month-1,d+1).getDay();
      const wk=(dow===0||dow===6)?" wkndcol":"";const cls=sh?("c-"+sh.key):(v==="İZİN"?"c-off":"");const wn=cw[si+"_"+d]?" warn":"";
      const disp=sh?(sh.start.slice(0,5)+"-"+sh.end.slice(0,5)):(v==="İZİN"?"İZİN":"");
      h+="<td class='cell day "+cls+wk+wn+"' onclick='openEd("+si+","+d+")'>"+disp+"</td>"}
    h+="<td class='sumcol net' style='right:112px'>"+p.net+"</td><td class='sumcol' style='right:56px'>"+p.tot+"</td><td class='sumcol' style='right:0'>"+(rate>0||s.rate?p.cost:"–")+"</td></tr>"});
  h+="</tbody><tfoot>";
  const rows=[["Sabah",cfg.ns,"S"],["Öğlen",cfg.no,"O"],["Gece",cfg.ng,"G"]];
  rows.forEach(([lbl,target,k])=>{
    h+="<tr><td class='namecol'>"+lbl+" ("+target+")</td>";
    for(let d=0;d<dim;d++){let c=0;staff.forEach(s=>{const sh=shiftByVal(s._days[d]);if(sh&&sh.key===k)c++});
      const cc=c===target?"cov-exact":(c<target?"cov-under":"cov-over");
      h+="<td><span class='covchip "+cc+"'>"+c+"</span></td>"}
    h+="<td class='sumcol' style='right:112px'></td><td class='sumcol' style='right:56px'></td><td class='sumcol' style='right:0'></td></tr>"});
  h+="</tfoot>";
  document.getElementById("grid").innerHTML=h;
  const wl=document.getElementById("warnList"),wb=document.getElementById("warnBadge");
  wb.textContent=W.length;wb.className="badge"+(W.length?"":" zero");
  wl.innerHTML=W.length?W.slice(0,60).map(x=>"<div class='warnrow'><span class='wic'>&#9650;</span><b>"+esc(x.who)+" · "+x.day+"</b><span>"+esc(x.msg)+"</span></div>").join(""):"<div class='warnrow ok'><span class='wic'>&#10003;</span><span>Tüm kurallar sağlanıyor. Plan temiz.</span></div>";
  renderStaffTbl();
}
function stat(ic,v,l,t){return "<div class='stat "+(t||"")+"'><div class='ic'>"+ic+"</div><div class='tx'><b>"+v+"</b><span>"+l+"</span></div></div>"}
function esc(s){return(s+"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}

function syncCfgInputs(){const g=id=>document.getElementById(id);
  g("cfgNS").value=cfg.ns;g("cfgNO").value=cfg.no;g("cfgNG").value=cfg.ng;g("cfgBreak").value=cfg.breakMin;
  g("cfgRest").value=cfg.rest;g("cfgStreak").value=cfg.streak;g("cfgWeekly").value=cfg.weekly;g("cfgRate").value=cfg.rate}
function saveCfg(){const g=id=>+document.getElementById(id).value;
  cfg.ns=g("cfgNS");cfg.no=g("cfgNO");cfg.ng=g("cfgNG");cfg.breakMin=g("cfgBreak");cfg.rest=g("cfgRest");cfg.streak=g("cfgStreak");cfg.weekly=g("cfgWeekly");cfg.rate=g("cfgRate");
  persist();render()}
function renderStaffTbl(){
  let h="<tr><th>Personel</th><th>Gece?</th><th>Saat ücreti €</th><th></th></tr>";
  staff.forEach((s,i)=>{h+="<tr><td><input type='text' value='"+esc(s.name)+"' onchange='setName("+i+",this.value)'></td>"+
    "<td><input type='checkbox' "+(!s.noNight?"checked":"")+" onchange='setNight("+i+",this.checked)'></td>"+
    "<td><input type='number' step='0.5' value='"+(s.rate??"")+"' placeholder='genel' onchange='setRate("+i+",this.value)'></td>"+
    "<td><button onclick='delStaff("+i+")'>sil</button></td></tr>"});
  document.getElementById("staffTbl").innerHTML=h;
}
function setName(i,v){staff[i].name=v.trim().toUpperCase();store.staff=staff.map(({_days,...r})=>r);persist();render()}
function setNight(i,ch){staff[i].noNight=!ch;store.staff=staff.map(({_days,...r})=>r);persist()}
function setRate(i,v){staff[i].rate=v===""?null:+v;store.staff=staff.map(({_days,...r})=>r);persist();render()}
function addStaff(){const n=prompt("Personel adı:");if(!n)return;const dim=daysInMonth(year,month);staff.push({name:n.trim().toUpperCase(),noNight:false,rate:null,_days:Array(dim).fill("")});store.staff=staff.map(({_days,...r})=>r);persist();render()}
function delStaff(i){if(!confirm(staff[i].name+" silinsin mi?"))return;staff.splice(i,1);store.staff=staff.map(({_days,...r})=>r);persist();render()}

let curSi,curDi;
function openEd(si,di){curSi=si;curDi=di;const s=staff[si];const dow=new Date(year,month-1,di+1).getDay();
  let h="<h4>"+esc(s.name)+"</h4><div class='who'>"+(di+1)+" "+MONTHS[month-1]+" · "+TRDAY[dow]+" · şu an: <b>"+(s._days[di]||"boş")+"</b></div><div class='chips'>";
  cfg.shifts.forEach(sh=>{h+="<div class='chip "+sh.key+"' onclick='setVal(\""+sh.start+"-"+sh.end+"\")'>"+sh.label+"<br>"+sh.start+"-"+sh.end+"</div>"});
  h+="</div><div class='chips' style='margin-top:8px'><div class='chip off' onclick='setVal(\"İZİN\")'>İZİN</div><div class='chip' onclick='setVal(\"\")'>Temizle</div></div>";
  h+="<div class='ed-actions'><button onclick='closeEd()'>Kapat</button></div>";
  document.getElementById("editor").innerHTML=h;document.getElementById("overlay").classList.add("on")}
function setVal(v){staff[curSi]._days[curDi]=v;persist();render();closeEd()}
function closeEd(){document.getElementById("overlay").classList.remove("on")}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeEd()});

function exportXlsx(){const dim=daysInMonth(year,month);
  const head=["Personel"];for(let d=1;d<=dim;d++)head.push(d+" "+TRDAY[new Date(year,month-1,d).getDay()]);head.push("Vardiya","Net Saat","€");
  const rows=[head];
  staff.forEach(s=>{const p=personStats(s);const line=[s.name];for(let d=0;d<dim;d++){const sh=shiftByVal(s._days[d]);line.push(sh?sh.start+"-"+sh.end:(s._days[d]==="İZİN"?"İZİN":""))}line.push(p.tot,p.net,p.cost);rows.push(line)});
  rows.push([]);
  [["Sabah","S",cfg.ns],["Öğlen","O",cfg.no],["Gece","G",cfg.ng]].forEach(([lbl,k,t])=>{const line=[lbl+" ("+t+")"];for(let d=0;d<dim;d++){let c=0;staff.forEach(s=>{const sh=shiftByVal(s._days[d]);if(sh&&sh.key===k)c++});line.push(c)}line.push("","","");rows.push(line)});
  const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,MONTHS[month-1]+" "+year);
  XLSX.writeFile(wb,"vardiya_"+year+"-"+String(month).padStart(2,"0")+".xlsx")}

load();
</script>
