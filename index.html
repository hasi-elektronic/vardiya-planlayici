<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vardiya Planlayıcı v1.0</title>
<!-- Vardiya Planlayıcı v1.0 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f8;--panel:#ffffff;--panel2:#f7f8fa;--ink:#1e2530;--ink2:#5c6674;--ink3:#98a1af;--line:#e8eaee;--line2:#f1f2f5;
  --accent:#2f4b7c;--accent2:#a8434c;--accent-soft:#eaeef4;--warn:#a8434c;--warn-soft:#f7edec;--wknd:#f7f7f5;--ok:#3f6e7d;
  --sab-bg:#e5f5ea;--sab-tx:#256b43;--sab-ac:#41a06a;
  --ogl-bg:#faeaeb;--ogl-tx:#a5333c;--ogl-ac:#d5535c;
  --gec-bg:#e6f0fa;--gec-tx:#215a89;--gec-ac:#3f8bce;
  --off-bg:#f1f2f5;--off-tx:#8b93a1;--off-ac:#ccd1d9;
  --shadow:0 1px 2px rgba(30,37,48,.03),0 2px 8px rgba(30,37,48,.04);
  --shadow-lg:0 20px 50px rgba(30,37,48,.2);
}
[data-theme="dark"]{
  --bg:#0f1319;--panel:#171b22;--panel2:#1c212a;--ink:#e4e7ec;--ink2:#98a1af;--ink3:#69727e;--line:#282e37;--line2:#20252d;
  --accent:#6f8fc0;--accent2:#cc7f88;--accent-soft:#222a37;--warn:#c47c82;--warn-soft:#2a1e20;--wknd:#161a1f;--ok:#6f9aa5;
  --sab-bg:#14291d;--sab-tx:#72c692;--sab-ac:#3f8a60;
  --ogl-bg:#2e1a1c;--ogl-tx:#e0898f;--ogl-ac:#a05159;
  --gec-bg:#132638;--gec-tx:#78b0e4;--gec-ac:#3d72ab;
  --off-bg:#20252d;--off-tx:#7e8896;--off-ac:#39424e;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);
  --shadow-lg:0 24px 60px rgba(0,0,0,.65);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg);font-size:13px;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
.app{display:flex;min-height:100vh}
svg.i{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}

/* SIDEBAR */
.sidebar{width:230px;flex:none;background:var(--panel);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:16px 13px}
.sb-logo{display:flex;align-items:center;gap:11px;padding:4px 8px 18px}
.logomark{width:32px;height:32px;border-radius:9px;background:var(--accent);display:grid;place-items:center;flex:none}
.logomark::before{content:"";width:13px;height:13px;border-radius:4px;border:2.5px solid #fff}
.sb-logo b{font-size:15px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.sb-logo small{font-size:10px;color:var(--ink3);display:block;font-weight:600}
.navsec{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:700;padding:8px 11px 5px}
.navitem{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--ink2);font-weight:600;font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:.12s;margin-bottom:1px}
.navitem:hover{background:var(--panel2);color:var(--ink)}
.navitem.on{background:var(--accent-soft);color:var(--accent)}
.sb-bottom{margin-top:auto;display:flex;flex-direction:column;gap:7px;padding-top:10px;border-top:1px solid var(--line)}
.sb-hasi{display:flex;align-items:center;gap:8px;padding:8px 11px;font-size:11px;color:var(--ink2);text-decoration:none;border-radius:9px}
.sb-hasi:hover{background:var(--panel2)}
.sb-hasi b{color:var(--accent2);font-weight:800}
.sb-hasi .hi{width:14px;height:14px;border-radius:4px;background:var(--accent2)}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:var(--bg);padding:16px 24px 10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tb-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ptitle{font-size:21px;font-weight:800;letter-spacing:-.025em;margin:0}
.month-nav{display:flex;align-items:center;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;box-shadow:var(--shadow)}
.month-nav .m{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12.5px;min-width:112px;text-align:center}
.month-nav button{border:none;background:transparent;padding:5px 9px}
.month-nav button:hover{background:var(--line2);transform:none}
button{font-family:inherit;font-size:12.5px;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 13px;border-radius:9px;cursor:pointer;font-weight:600;transition:.13s;display:inline-flex;align-items:center;gap:6px;box-shadow:var(--shadow)}
button:hover{border-color:var(--ink3);transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.ghost{box-shadow:none;border-color:transparent;background:transparent;color:var(--ink2)}
button.ghost:hover{background:var(--panel2);border-color:transparent}
button.primary{background:var(--accent);border-color:transparent;color:#fff}
button.primary:hover{filter:brightness(1.1)}
button.icon{padding:8px 10px}
.spacer{flex:1}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.saved{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.content{padding:8px 24px 40px;max-width:1520px}

/* KPI */
.bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:13px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;box-shadow:var(--shadow)}
.stat .sl{font-size:10px;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;font-weight:700;display:block;margin-bottom:6px}
.stat b{font-family:"JetBrains Mono",monospace;font-size:22px;font-weight:700;line-height:1}
.stat.t-warn b{color:var(--warn)}.stat.t-ok b{color:var(--ok)}

/* ALERT */
.alertbar{background:var(--warn-soft);border:1px solid color-mix(in srgb,var(--warn) 20%,transparent);border-radius:12px;padding:11px 15px;margin-bottom:16px;display:flex;align-items:center;gap:11px;cursor:pointer}
.alertbar .ab-ic{color:var(--warn);font-weight:800}
.alertbar .ab-tx{font-size:12.5px;color:var(--warn);font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alertbar .ab-more{font-size:11px;color:var(--warn);font-weight:700;white-space:nowrap}
.alertlist{margin:-8px 0 16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;display:flex;flex-direction:column;gap:5px;max-height:220px;overflow:auto}
.alertrow{display:flex;gap:10px;align-items:center;font-size:12px;padding:7px 10px;border-radius:8px;background:var(--warn-soft)}
.alertrow b{color:var(--warn);font-weight:700;min-width:110px}

/* nav row (week/day) */
.navrow{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.navrow .lbl{font-weight:800;font-size:15px;letter-spacing:-.01em}
.navrow .lbl small{color:var(--ink2);font-weight:600;font-family:"JetBrains Mono",monospace;font-size:12px;margin-left:8px}
.navrow button{width:36px;height:36px;justify-content:center;border-radius:10px;padding:0}
.today-pill{width:auto!important;height:auto!important;font-size:11.5px;padding:7px 13px;margin-left:2px}

/* avatar */
.av{border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;flex:none;font-family:Inter}

/* HAFTA */
.wkcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow-x:auto}
table.wk{width:100%;border-collapse:separate;border-spacing:0;min-width:840px}
.wk th{padding:15px 8px 13px;text-align:center;border-bottom:1px solid var(--line);vertical-align:bottom}
.wk th .wd{display:block;font-size:9.5px;color:var(--ink3);text-transform:uppercase;font-weight:700;letter-spacing:.05em}
.wk th .wn{display:inline-grid;place-items:center;font-family:"JetBrains Mono",monospace;font-size:17px;color:var(--ink);font-weight:700;margin-top:4px;width:30px;height:30px}
.wk th.wknd .wd{color:var(--ogl-ac)}
.wk th .wn.today{background:var(--accent);color:#fff;border-radius:50%}
.wk th.wkname{text-align:left;padding-left:18px}
.wk .wkname{position:sticky;left:0;background:var(--panel);z-index:2;min-width:210px;box-shadow:1px 0 0 var(--line)}
.wk td{border-bottom:1px solid var(--line2);vertical-align:middle;height:64px}
.wk td.wknd{background:var(--wknd)}
.wk tbody tr:hover .wkname{background:var(--panel2)}
.wkcell{cursor:pointer;padding:0}
.empcell{display:flex;align-items:center;gap:11px;padding:9px 10px 9px 18px}
.empcell .av{width:34px;height:34px;font-size:12.5px}
.empmeta{min-width:0;line-height:1.3}
.empmeta b{font-size:13px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empmeta span{font-size:10.5px;color:var(--ink2);font-family:"JetBrains Mono",monospace}
.empmeta .nn{color:var(--gec-tx);font-weight:700}
.shift{margin:6px 8px;border-radius:12px;padding:9px 12px;display:flex;flex-direction:column;gap:3px;transition:.13s}
.wkcell:hover .shift{filter:brightness(.985)}
.shift .t{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12px}
.shift .l{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;opacity:.72;display:inline-flex;align-items:center;gap:5px}
.shift .l::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}
.shift.S{background:var(--sab-bg)}.shift.S .t,.shift.S .l{color:var(--sab-tx)}
.shift.O{background:var(--ogl-bg)}.shift.O .t,.shift.O .l{color:var(--ogl-tx)}
.shift.G{background:var(--gec-bg)}.shift.G .t,.shift.G .l{color:var(--gec-tx)}
.shift.warn{box-shadow:inset 0 0 0 1.5px var(--warn)}
.offblock{margin:7px 8px;border-radius:9px;padding:11px 8px;text-align:center;color:var(--off-tx);font-size:10px;font-weight:700;background:var(--off-bg)}
.emptyblock{margin:7px 8px;border-radius:9px;padding:11px 8px;text-align:center;color:var(--ink3);opacity:.35;font-size:15px;border:1.5px dashed var(--line)}
.wk tfoot td{border-top:1.5px solid var(--line);border-bottom:none;height:44px}
.wk tfoot .wkname{color:var(--ink2);font-weight:700;font-size:11px;padding-left:18px}
.covmini{display:flex;gap:4px;justify-content:center;padding:8px 4px}
.mini{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:10.5px;width:22px;height:20px;display:grid;place-items:center;border-radius:6px}
.mini.S{background:var(--sab-bg);color:var(--sab-tx)}.mini.O{background:var(--ogl-bg);color:var(--ogl-tx)}.mini.G{background:var(--gec-bg);color:var(--gec-tx)}
.mini.bad{box-shadow:0 0 0 1.5px var(--warn)}

/* GÜN */
.viewpane{margin-top:2px}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(258px,1fr));gap:14px}
.scard{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.scard .shead{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line2)}
.scard .st{display:flex;flex-direction:column;gap:2px}
.scard .st .nm{font-weight:800;font-size:13.5px}
.scard.S .nm{color:var(--sab-tx)}.scard.O .nm{color:var(--ogl-tx)}.scard.G .nm{color:var(--gec-tx)}.scard.F .nm{color:var(--off-tx)}
.scard .st .time{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:10.5px;color:var(--ink3)}
.scard .cnt{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:14px;padding:3px 10px;border-radius:8px;background:var(--panel2);color:var(--ink2)}
.scard.S .cnt{background:var(--sab-bg);color:var(--sab-tx)}.scard.O .cnt{background:var(--ogl-bg);color:var(--ogl-tx)}.scard.G .cnt{background:var(--gec-bg);color:var(--gec-tx)}
.scard.warn .cnt{background:var(--warn);color:#fff}
.plist{padding:7px}
.prow{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;cursor:pointer;font-weight:600;font-size:13.5px;transition:.12s}
.prow:hover,.prow:active{background:var(--panel2)}
.prow .av{width:30px;height:30px;font-size:11.5px}
.prow .wtag{margin-left:auto;color:var(--warn);font-weight:800;font-size:12px}
.prow.empty{color:var(--ink3);font-weight:500;cursor:default;font-size:12.5px;justify-content:center;padding:14px}
.prow.empty:hover{background:none}

/* KİŞİ */
.pchips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;-webkit-overflow-scrolling:touch}
.pchip{flex:none;display:flex;align-items:center;gap:8px;padding:6px 14px 6px 6px;border-radius:24px;border:1px solid var(--line);background:var(--panel);font-weight:600;font-size:12.5px;cursor:pointer;white-space:nowrap;transition:.12s;box-shadow:var(--shadow)}
.pchip .av{width:26px;height:26px;font-size:10.5px}
.pchip.on{background:var(--accent);color:#fff;border-color:transparent}
.psum{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:11px;margin:2px 0 18px}
.pstat{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 15px;box-shadow:var(--shadow)}
.pstat b{font-family:"JetBrains Mono",monospace;font-size:18px;display:block;font-weight:700}
.pstat span{font-size:9.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-top:3px;display:block}
.daylist{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:9px}
.dayrow{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 14px;cursor:pointer;box-shadow:var(--shadow);transition:.12s}
.dayrow:hover,.dayrow:active{transform:translateY(-1px);border-color:var(--ink3)}
.dayrow.wknd{background:var(--wknd)}
.dayrow .dd{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:17px;width:28px;text-align:center;flex:none}
.dayrow .dw{font-size:10px;color:var(--ink2);text-transform:uppercase;font-weight:700;width:38px;flex:none}
.dayrow .sb{margin-left:auto;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:11.5px;padding:6px 11px;border-radius:8px}
.sb.S{background:var(--sab-bg);color:var(--sab-tx)}.sb.O{background:var(--ogl-bg);color:var(--ogl-tx)}.sb.G{background:var(--gec-bg);color:var(--gec-tx)}.sb.F{background:var(--off-bg);color:var(--off-tx)}
.dayrow .wtag{color:var(--warn);font-weight:800;font-size:12px}

/* AY */
.gridbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:auto;max-height:calc(100vh - 280px);box-shadow:var(--shadow);-webkit-overflow-scrolling:touch}
table.mth{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}
.mth th,.mth td{border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:0;text-align:center;white-space:nowrap}
.mth thead th{position:sticky;top:0;background:var(--panel);z-index:20;font-weight:700;color:var(--ink2)}
.mth .dnum{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);padding:8px 0 1px;font-weight:700}
.mth .dname{font-size:8.5px;color:var(--ink3);padding:0 0 7px;font-weight:700;letter-spacing:.04em}
.mth th.day,.mth td.day{width:66px;min-width:66px}
.mth .wkndcol{background:var(--wknd)}
.mth .namecol{position:sticky;left:0;z-index:30;background:var(--panel);text-align:left;padding:0 12px;font-weight:600;min-width:148px;box-shadow:1px 0 0 var(--line);font-size:12.5px}
.mth thead .namecol{z-index:35}
.mth tbody tr{height:33px}
.mth tbody tr:hover .namecol{background:var(--panel2)}
.mcell{cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:600;height:33px;transition:.1s;position:relative}
.mcell:hover{outline:2px solid var(--accent);outline-offset:-2px;z-index:5}
.m-S{background:var(--sab-bg);color:var(--sab-tx)}
.m-O{background:var(--ogl-bg);color:var(--ogl-tx)}
.m-G{background:var(--gec-bg);color:var(--gec-tx)}
.m-off{background:var(--off-bg);color:var(--off-tx);font-weight:700;font-size:9px}
.mcell.warn::after{content:"";position:absolute;top:2px;right:2px;border-top:7px solid var(--warn);border-left:7px solid transparent}
.sumcol{position:sticky;background:var(--panel);z-index:22;min-width:50px;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12px}
.mth tbody tr:hover .sumcol{background:var(--panel2)}
.sc-net{right:50px;color:var(--sab-tx)}.sc-vard{right:0}
.sumhead{font-size:8.5px;color:var(--ink2);font-weight:700;padding:5px 3px;text-transform:uppercase}
.mth tfoot td{background:var(--panel2);height:28px;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700}
.mth tfoot .namecol{background:var(--panel2);font-family:Inter;font-weight:700;font-size:10px;color:var(--ink2)}
.covchip{display:inline-grid;place-items:center;width:24px;height:19px;border-radius:6px;font-size:10.5px;font-weight:700}
.cov-exact{background:var(--sab-bg);color:var(--sab-tx)}.cov-under{background:var(--warn-soft);color:var(--warn)}.cov-over{background:var(--ogl-bg);color:var(--ogl-tx)}

/* AYARLAR */
.setgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.setcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)}
.setcard h3{margin:0 0 14px;font-size:14px;font-weight:800}
.cfg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:13px}
.cfg label{font-size:10px;color:var(--ink2);font-weight:700;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
.cfg input{font-family:"JetBrains Mono",monospace;width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:12.5px;background:var(--panel2);color:var(--ink);transition:.14s}
.cfg input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.stafftbl{width:100%;border-collapse:collapse;font-size:12px}
.stafftbl th{text-align:left;color:var(--ink2);font-size:10px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--line);letter-spacing:.03em;font-weight:700}
.stafftbl td{padding:5px 8px;border-bottom:1px solid var(--line2)}
.stafftbl input[type=number]{width:72px;font-family:"JetBrains Mono",monospace;padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--ink)}
.stafftbl input[type=text]{width:140px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-weight:600;background:var(--panel2);color:var(--ink)}
.stafftbl input:focus{outline:none;border-color:var(--accent)}
.stafftbl .nmc{display:flex;align-items:center;gap:9px}
.stafftbl .av{width:26px;height:26px;font-size:10px}
.stafftbl button{padding:5px 10px;font-size:11px;box-shadow:none}

.overlay{position:fixed;inset:0;background:rgba(10,14,20,.45);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.on{display:flex}
.editor{background:var(--panel);border-radius:18px;box-shadow:var(--shadow-lg);width:350px;max-width:92vw;padding:22px;animation:pop .16s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes sheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
.editor .ehead{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.editor .ehead .av{width:42px;height:42px;font-size:15px}
.editor h4{margin:0 0 1px;font-size:15.5px;font-weight:800}

<body>
<div class="app">

<script>
const TRDAY=["PAZAR","PZT","SALI","ÇAR","PERŞ","CUMA","CMTS"];
const TRDAYL=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const MONTHS=["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
const MONTHT=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const SEED_NAMES=["ESENGÜL","ALİ","HÜSEYİN","SEVHAN","OĞUZHAN","TESLİME","MERVE","ŞERİFE","DİLEK","ALİ KEMAL","MEHMET","MUSTAFA","TUĞBA","ÖZGE","NİSA","ESMA","ESRA","HATİCE","GÜLSÜM","RECEP AVCI"];
const AVCOLORS=["#4f6b96","#8a4a52","#5a7ba0","#96545c","#3f5c86","#7d5a72","#5e7590","#8a5f66","#4a6d82","#6a5b8a","#456589","#93555b"];
const ICON={
  week:"<rect x='3' y='4' width='18' height='17' rx='2'/><line x1='3' y1='9' x2='21' y2='9'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='16' y1='2' x2='16' y2='6'/>",
  day:"<circle cx='12' cy='12' r='9'/><polyline points='12 7 12 12 15 14'/>",
  person:"<path d='M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2'/><circle cx='9' cy='7' r='4'/><path d='M22 21v-2a4 4 0 0 0-3-3.87'/><path d='M16 3.13a4 4 0 0 1 0 7.75'/>",
  month:"<rect x='3' y='3' width='7' height='7' rx='1'/><rect x='14' y='3' width='7' height='7' rx='1'/><rect x='14' y='14' width='7' height='7' rx='1'/><rect x='3' y='14' width='7' height='7' rx='1'/>",
  fair:"<line x1='6' y1='20' x2='6' y2='14'/><line x1='12' y1='20' x2='12' y2='4'/><line x1='18' y1='20' x2='18' y2='10'/>",
  settings:"<line x1='4' y1='21' x2='4' y2='14'/><line x1='4' y1='10' x2='4' y2='3'/><line x1='12' y1='21' x2='12' y2='12'/><line x1='12' y1='8' x2='12' y2='3'/><line x1='20' y1='21' x2='20' y2='16'/><line x1='20' y1='12' x2='20' y2='3'/><line x1='1' y1='14' x2='7' y2='14'/><line x1='9' y1='8' x2='15' y2='8'/><line x1='17' y1='16' x2='23' y2='16'/>",
  moon:"<path d='M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z'/>",
  sun:"<circle cx='12' cy='12' r='5'/><line x1='12' y1='1' x2='12' y2='3'/><line x1='12' y1='21' x2='12' y2='23'/><line x1='4.2' y1='4.2' x2='5.6' y2='5.6'/><line x1='18.4' y1='18.4' x2='19.8' y2='19.8'/><line x1='1' y1='12' x2='3' y2='12'/><line x1='21' y1='12' x2='23' y2='12'/><line x1='4.2' y1='19.8' x2='5.6' y2='18.4'/><line x1='18.4' y1='5.6' x2='19.8' y2='4.2'/>"
};
const NAV=[{v:"week",l:"Program",i:"week"},{v:"day",l:"Gün",i:"day"},{v:"person",l:"Ekip",i:"person"},{v:"month",l:"Ay",i:"month"},{v:"fair",l:"Denge",i:"fair"},{v:"settings",l:"Ayarlar",i:"settings"}];
function svg(k){return "<svg class='i' viewBox='0 0 24 24'>"+ICON[k]+"</svg>"}
const DEFAULT_CFG={ns:6,no:6,ng:3,breakMin:30,rest:11,streak:6,weekly:48,rate:0,
  shifts:[{key:"S",label:"Sabah",start:"07:00",end:"15:00",need:6,roleNeeds:{}},{key:"O",label:"Öğlen",start:"15:00",end:"23:00",need:6,roleNeeds:{}},{key:"G",label:"Gece",start:"23:00",end:"07:00",need:3,roleNeeds:{}}]};

let store,key,year,month,staff,cfg;
let view="week",selDay=0,selWeek=0,selPerson=0,alertOpen=false;
const API="https://vardiya-api.hguencavdi.workers.dev";
let cloud=null;try{cloud=JSON.parse(sGet("vardiya_cloud")||"null")}catch(e){}
let readOnly=false,cloudBusy=false,_cloudT=null;
let mem={};
function sGet(k){try{return localStorage.getItem(k)}catch(e){return mem[k]||null}}
function sSet(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}
let savedT;
function flashSaved(){const t=document.getElementById("savedTxt");if(!t)return;t.textContent="kaydedildi";clearTimeout(savedT);savedT=setTimeout(()=>t.textContent="kayıtlı",1200)}
function toggleTheme(){const cur=document.documentElement.getAttribute("data-theme");const nx=cur==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",nx);sSet("vardiya_theme",nx);updateThemeItem()}
function updateThemeItem(){const dk=document.documentElement.getAttribute("data-theme")==="dark";const b=document.getElementById("themeItem");if(b)b.innerHTML=svg(dk?"sun":"moon")+"<span>"+(dk?"Açık tema":"Koyu tema")+"</span>"}
function initTheme(){document.documentElement.setAttribute("data-theme",sGet("vardiya_theme")||"light");updateThemeItem()}

function hashN(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h}
function avatarFor(name){const p=(name||"").trim().split(/\s+/);const ini=(p[0]?p[0][0]:"")+(p[1]?p[1][0]:"");return {bg:AVCOLORS[hashN(name)%AVCOLORS.length],ini:ini.toUpperCase()}}
function avHtml(name,cls){const a=avatarFor(name);return "<div class='av "+(cls||"")+"' style='background:"+a.bg+"'>"+esc(a.ini)+"</div>"}

function load(){
  const wid=new URLSearchParams(location.search).get("w");
  if(wid){loadPublic(wid);return}
  try{store=JSON.parse(sGet("vardiya_adv"))||{}}catch(e){store={}}
  cfg=store.cfg?Object.assign({},DEFAULT_CFG,store.cfg):JSON.parse(JSON.stringify(DEFAULT_CFG));
  if(!store.staff) store.staff=SEED_NAMES.map(n=>({name:n,noNight:false,rate:null}));
  year=2026;month=7;
  const sv=sGet("vardiya_view");view=(["week","day","person","month","settings"].includes(sv))?sv:(window.innerWidth<720?"day":"week");
  initTheme();setMonth(year,month,true);
  if(cloud&&cloud.id)cloudPull(false);
}
function cleanStaff(){return staff.map(({_days,_lock,...r})=>r)}
function persist(){if(readOnly)return;store.cfg=cfg;store.staff=cleanStaff();store.months=store.months||{};store.months[key]=plan();store.locks=store.locks||{};const lk={};staff.forEach(s=>{if(s._lock&&s._lock.length)lk[s.name]=s._lock.slice()});store.locks[key]=lk;sSet("vardiya_adv",JSON.stringify(store));flashSaved();if(cloud&&cloud.id)cloudPushDebounced()}
function plan(){const o={};staff.forEach(s=>o[s.name]=s._days);return o}
function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function monTitle(){return MONTHT[month-1]}

function setMonth(y,m,autogen){
  year=y;month=m;key=y+"-"+m;const dim=daysInMonth(y,m);
  staff=(store.staff||[]).map(s=>Object.assign({},s));
  const saved=(store.months||{})[key]||{};let empty=true;
  staff.forEach(s=>{let d=saved[s.name];if(!d){d=Array(dim).fill("")}else{d=d.slice();while(d.length<dim)d.push("");d.length=dim;if(d.some(x=>x))empty=false}s._days=d});
  const lockSaved=(store.locks||{})[key]||{};staff.forEach(s=>{s._lock=(lockSaved[s.name]||[]).slice()});
  document.getElementById("monthLabel").textContent=MONTHS[m-1]+" "+y;
  const today=new Date();if(today.getFullYear()===y&&today.getMonth()+1===m)selDay=today.getDate()-1;else selDay=Math.min(Math.max(selDay,0),dim-1);
  selWeek=Math.floor(selDay/7);if(selPerson>=staff.length)selPerson=0;
  if(empty&&autogen)generate();
  render();syncCfgInputs();
}
function shiftMonth(d){let m=month+d,y=year;if(m<1){m=12;y--}if(m>12){m=1;y++}store.months=store.months||{};store.months[key]=plan();sSet("vardiya_adv",JSON.stringify(store));setMonth(y,m,true)}
function setView(v){view=v;sSet("vardiya_view",v);render()}
function goTodayFull(){const t=new Date();if(t.getFullYear()!==year||t.getMonth()+1!==month){setMonth(t.getFullYear(),t.getMonth()+1,true);}selDay=t.getDate()-1;selWeek=Math.floor(selDay/7);render()}

function pmin(hhmm){const[h,m]=hhmm.split(":").map(Number);return h*60+(m||0)}
function shiftByVal(v){for(const sh of cfg.shifts){if(v===sh.start+"-"+sh.end)return sh}return null}
function grossHours(v){const sh=shiftByVal(v);if(!sh)return 0;let s=pmin(sh.start),e=pmin(sh.end);if(e<=s)e+=1440;return (e-s)/60}
function netHours(v){const g=grossHours(v);if(!g)return 0;return g-(g>6?cfg.breakMin/60:0)}
function restBetween(prevSh,nextSh){let pe=pmin(prevSh.end);if(pe<=pmin(prevSh.start))pe+=1440;const ns=1440+pmin(nextSh.start);return (ns-pe)/60}

function generate(){
  const dim=daysInMonth(year,month);
  ensureShifts();const S=cfg.shifts.map(sh=>Object.assign({},sh));
  staff.forEach(s=>{const lk=s._lock||[];s._days=s._days.map((v,i)=>((lk.indexOf(i)>=0||v==="YOK")?v:""))});
  const st={};staff.forEach(s=>st[s.name]={last:null,streak:0,tot:0,g:0});
  const elig=(s,sh)=>{const t=st[s.name];if(t.streak>=cfg.streak)return false;if(sh.key==="G"&&s.noNight)return false;if(t.last===null)return true;const prev=S.find(x=>x.key===t.last);return restBetween(prev,sh)>=cfg.rest};
  const score=(s,sh)=>{const t=st[s.name];let v=t.tot+t.streak*2.2;if(sh.key==="G")v+=t.g*3;return v+Math.random()*0.05};
  for(let di=0;di<dim;di++){
    const cnt={S:0,O:0,G:0};const used=new Set();
    staff.forEach(s=>{const sh=shiftByVal(s._days[di]);const isLk=(s._lock||[]).indexOf(di)>=0;if(sh){cnt[sh.key]=(cnt[sh.key]||0)+1;used.add(s.name)}else if(s._days[di]==="YOK"||s._days[di]==="İZİN"||isLk)used.add(s.name)});
    for(const sh of S){let cur=cnt[sh.key]||0;if(cur>=sh.need)continue;const rn=sh.roleNeeds||{};const have={};staff.forEach(s=>{const x=shiftByVal(s._days[di]);if(x&&x.key===sh.key)have[s.role||""]=(have[s.role||""]||0)+1});for(const role in rn){let rneed=rn[role]-(have[role]||0);if(rneed<=0)continue;let pool=staff.filter(s=>!used.has(s.name)&&s._days[di]===""&&(s.role||"")===role&&elig(s,sh));pool.sort((a,b)=>score(a,sh)-score(b,sh));const take=pool.slice(0,rneed);if(take.length<rneed)return {ok:false,day:di+1,shift:sh.label,role:role,got:cur+take.length};take.forEach(s=>{s._days[di]=sh.start+"-"+sh.end;used.add(s.name);cur++})}let rem=sh.need-cur;if(rem>0){let pool=staff.filter(s=>!used.has(s.name)&&s._days[di]===""&&elig(s,sh));pool.sort((a,b)=>score(a,sh)-score(b,sh));const take=pool.slice(0,rem);if(take.length<rem)return {ok:false,day:di+1,shift:sh.label,got:cur+take.length};take.forEach(s=>{s._days[di]=sh.start+"-"+sh.end;used.add(s.name);cur++})}}
    staff.forEach(s=>{const sh=shiftByVal(s._days[di]);const t=st[s.name];if(sh){t.last=sh.key;t.streak++;t.tot++;if(sh.key==="G")t.g++}else{t.last=null;t.streak=0}});
  }
  staff.forEach(s=>{for(let i=0;i<dim;i++)if(s._days[i]==="")s._days[i]="İZİN"});
  return {ok:true};
}
function doGenerate(){const r=generate();if(!r.ok){alert("Üretilemedi: "+r.day+". gün "+r.shift+(r.role?" · "+r.role+" rolü":"")+" dolmadı ("+r.got+" kişi). Kadro/rol sayılarını veya kısıtları gözden geçir.");render();return}persist();render()}
function clearMonth(){if(!confirm("Bu ayın planı silinsin mi?"))return;const dim=daysInMonth(year,month);staff.forEach(s=>s._days=Array(dim).fill(""));persist();render()}

function warnings(){
  const W=[],cw={};const dim=daysInMonth(year,month);
  staff.forEach((s,si)=>{
    let streak=0;
    for(let i=0;i<dim;i++){const v=s._days[i],sh=shiftByVal(v);if(sh){streak++;if(streak>cfg.streak){W.push({who:s.name,day:i+1,msg:streak+" gün arka arkaya izinsiz"});cw[si+"_"+i]=1}}else if(v==="İZİN"||v===""){streak=0}}
    for(let i=0;i<dim-1;i++){const a=shiftByVal(s._days[i]),b=shiftByVal(s._days[i+1]);if(a&&b){const r=restBetween(a,b);if(r<cfg.rest){W.push({who:s.name,day:i+2,msg:"dinlenme "+r.toFixed(1)+"s (<"+cfg.rest+"s)"});cw[si+"_"+(i+1)]=1}}}
    let wk=0;
    for(let i=0;i<dim;i++){const dow=new Date(year,month-1,i+1).getDay();if(dow===1)wk=0;wk+=netHours(s._days[i]);const nd=i+1<dim?new Date(year,month-1,i+2).getDay():-1;if((nd===1||i===dim-1)&&wk>cfg.weekly)W.push({who:s.name,day:i+1,msg:"haftalık "+wk.toFixed(1)+"s net (>"+cfg.weekly+"s)"})}
  });
  for(let i=0;i<dim;i++){cfg.shifts.forEach(sh=>{let c=0;const br={};staff.forEach(s=>{const x=shiftByVal(s._days[i]);if(x&&x.key===sh.key){c++;br[s.role||""]=(br[s.role||""]||0)+1}});if(c!==sh.need)W.push({who:"KADRO",day:i+1,msg:sh.label+" "+c+"/"+sh.need});const rn=sh.roleNeeds||{};for(const role in rn){if((br[role]||0)!==rn[role])W.push({who:"KADRO",day:i+1,msg:sh.label+" "+role+" "+(br[role]||0)+"/"+rn[role]})}})}
  return {W,cw};
}
function personStats(s){let sh={S:0,O:0,G:0},tot=0,net=0;const dim=daysInMonth(year,month);for(let i=0;i<dim;i++){const x=shiftByVal(s._days[i]);if(x){sh[x.key]++;tot++;net+=netHours(s._days[i])}}const rate=(s.rate!=null&&s.rate!=="")?+s.rate:+cfg.rate;return {sh,tot,net:Math.round(net*10)/10,cost:Math.round(net*rate)}}

function render(){

  document.getElementById("ptitle").textContent=(NAV.find(n=>n.v===view)||{l:"Program"}).l;

  // stats + alert (planlama görünümlerinde)

  document.getElementById("statbar").style.display=showStats?"":"none";

    const rate=+cfg.rate;
    document.getElementById("statbar").innerHTML=
      stat(staff.length,"personel","")+stat(totShift,"vardiya / ay","")+stat(totNet.toFixed(0)+"s","net işgücü","t-hours")+
      (rate>0?stat(totCost.toLocaleString("tr")+" €","aylık işçilik","t-cost"):"")+stat(W.length,"kural uyarısı",W.length?"t-warn":"t-ok");
    renderAlert(W);
  } else {document.getElementById("alertBar").innerHTML=""}
  const panes={week:"weekView",day:"dayView",person:"personView",month:"monthView",fair:"fairView",settings:"settingsView"};
  Object.keys(panes).forEach(k=>document.getElementById(panes[k]).style.display=(view===k?"":"none"));
  if(view==="week")renderWeek(cw);else if(view==="day")renderDay(cw);else if(view==="person")renderPerson(cw);else if(view==="month")renderMonth(cw);else if(view==="fair")renderFairness();else renderSettings();
}
function stat(v,l,t){return "<div class='stat "+(t||"")+"'><span class='sl'>"+l+"</span><b>"+v+"</b></div>"}
function esc(s){return(s+"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}

function renderAlert(W){
  const el=document.getElementById("alertBar");
  if(!W.length){el.innerHTML="";return}
  const preview=W.slice(0,2).map(x=>x.who+"·"+x.day+" "+x.msg).join("   •   ");

  el.innerHTML=h;
}

    days.forEach(d=>{const v=s._days[d];const sh=shiftByVal(v);const dow=new Date(year,month-1,d+1).getDay();const wk=(dow===0||dow===6)?" wknd":"";const wn=cw[si+"_"+d]?" warn":"";const lb=(s._lock||[]).indexOf(d)>=0?"<span class='lockb'>&#128274;</span>":"";

    h+="<td><div class='covmini'>"+mh+"</div></td>"});
  h+="</tr></tfoot></table></div>";

}

function weekAgendaHtml(days,cw){const today=new Date();let h="<div class='agenda'>";days.forEach(d=>{const dow=new Date(year,month-1,d+1).getDay();const isT=today.getFullYear()===year&&today.getMonth()+1===month&&today.getDate()===d+1;const cov={};staff.forEach(s=>{const sh=shiftByVal(s._days[d]);if(sh)cov[sh.key]=(cov[sh.key]||0)+1});let ccov="";cfg.shifts.forEach(sh=>{const cn=cov[sh.key]||0;ccov+="<span class='cc "+sh.key+(cn===sh.need?"":" bad")+"'>"+cn+"</span>"});h+="<div class='agday"+(isT?" today":"")+((dow===0||dow===6)?" wknd":"")+"'><div class='aghead'><div class='agdate'><b>"+(d+1)+"</b><span>"+TRDAYL[dow]+"</span></div><div class='agcov'>"+ccov+"</div></div><div class='agbody'>";cfg.shifts.forEach(sh=>{const ppl=[];staff.forEach((s,si)=>{if(s._days[d]===sh.start+"-"+sh.end)ppl.push({s,si})});h+="<div class='agshift "+sh.key+"'><div class='agsl'>"+sh.label+"<small>"+sh.start.slice(0,5)+"–"+sh.end.slice(0,5)+"</small></div><div class='agppl'>";if(ppl.length)ppl.forEach(({s,si})=>{const wn=cw[si+"_"+d]?" warn":"";h+="<span class='agp"+wn+"' onclick='openEd("+si+","+d+")'>"+avHtml(s.name)+esc(s.name)+"</span>"});else h+="<span class='agempty'>— boş —</span>";h+="</div></div>"});h+="</div></div>"});h+="</div>";return h}

function exportXlsx(){const dim=daysInMonth(year,month);const NC=1+dim+3;
  const smap={};cfg.shifts.forEach(sh=>smap[sh.start+"-"+sh.end]=sh.key);
  const header=["Personel"];for(let d=1;d<=dim;d++)header.push(d+"\n"+TRDAY[new Date(year,month-1,d).getDay()]);header.push("Vardiya","Net","€");

  const cStart=rows.length;
  cfg.shifts.forEach(sh=>{const lbl=sh.label,k=sh.key,t=sh.need;const line=[lbl+" ("+t+")"];for(let d=0;d<dim;d++){let c=0;staff.forEach(s=>{const sh=shiftByVal(s._days[d]);if(sh&&sh.key===k)c++});line.push(c)}line.push("","","");rows.push(line)});

  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:NC-1}}];
  ws["!freeze"]={xSplit:1,ySplit:2,topLeft:"B3"};ws["!views"]=[{state:"frozen",xSplit:1,ySplit:2}];
  const C={navy:"FF2F4B7C",wh:"FFFFFFFF",ln:"FFE1E4EA",sbb:"FFE5F5EA",sbt:"FF256B43",ogb:"FFFAEAEB",ogt:"FFA5333C",geb:"FFE6F0FA",get:"FF215A89",offb:"FFF3F4F7",offt:"FF9AA1AE",sum:"FFF3F5F8",ink:"FF1E2530",wknd:"FFF4F2ED",warn:"FFA8434C",wnb:"FFF7EDEC"};
  const B={style:"thin",color:{rgb:C.ln}},bd={top:B,bottom:B,left:B,right:B};
  const set=(r,c,s)=>{const ref=XLSX.utils.encode_cell({r,c});if(!ws[ref])ws[ref]={t:"s",v:""};ws[ref].s=s};
  set(0,0,{fill:{patternType:"solid",fgColor:{rgb:C.navy}},font:{bold:true,sz:14,color:{rgb:C.wh},name:"Calibri"},alignment:{horizontal:"left",vertical:"center",indent:1}});
  for(let c=0;c<NC;c++){const isDay=c>=1&&c<=dim;set(1,c,{fill:{patternType:"solid",fgColor:{rgb:C.navy}},font:{bold:true,sz:isDay?9:10,color:{rgb:C.wh},name:"Calibri"},alignment:{horizontal:c===0?"left":"center",vertical:"center",wrapText:true,indent:c===0?1:0},border:bd})}
  staff.forEach((s,i)=>{const r=bStart+i;
    set(r,0,{fill:{patternType:"solid",fgColor:{rgb:C.wh}},font:{bold:true,sz:10,color:{rgb:C.ink},name:"Calibri"},alignment:{horizontal:"left",vertical:"center",indent:1},border:bd});
    for(let d=0;d<dim;d++){const c=1+d;const v=s._days[d];const key=smap[v];const dow=new Date(year,month-1,d+1).getDay();const wknd=(dow===0||dow===6);
      let bg=wknd?C.wknd:C.wh,tx=C.ink,bold=false;
      if(key==="S"){bg=C.sbb;tx=C.sbt;bold=true}else if(key==="O"){bg=C.ogb;tx=C.ogt;bold=true}else if(key==="G"){bg=C.geb;tx=C.get;bold=true}else if(v==="İZİN"||v==="YOK"){bg=C.offb;tx=C.offt}
      set(r,c,{fill:{patternType:"solid",fgColor:{rgb:bg}},font:{bold:bold,sz:8.5,color:{rgb:tx},name:"Calibri"},alignment:{horizontal:"center",vertical:"center"},border:bd})}
    for(let c=1+dim;c<NC;c++)set(r,c,{fill:{patternType:"solid",fgColor:{rgb:C.sum}},font:{bold:true,sz:10,color:{rgb:C.ink},name:"Calibri"},alignment:{horizontal:"center",vertical:"center"},border:bd})});
  const cK=cfg.shifts.map(s=>s.key),cT=cfg.shifts.map(s=>s.need);
  for(let ci=0;ci<cfg.shifts.length;ci++){const r=cStart+ci,key=cK[ci],target=cT[ci];
    set(r,0,{fill:{patternType:"solid",fgColor:{rgb:C.sum}},font:{bold:true,sz:9,color:{rgb:C.ink},name:"Calibri"},alignment:{horizontal:"left",vertical:"center",indent:1},border:bd});
    for(let d=0;d<dim;d++){const c=1+d;const ref=XLSX.utils.encode_cell({r,c});const cv=ws[ref]?ws[ref].v:0;const under=cv!=target;const bg=key==="S"?C.sbb:key==="O"?C.ogb:C.geb;const tx=key==="S"?C.sbt:key==="O"?C.ogt:C.get;
      set(r,c,{fill:{patternType:"solid",fgColor:{rgb:under?C.wnb:bg}},font:{bold:true,sz:9,color:{rgb:under?C.warn:tx},name:"Calibri"},alignment:{horizontal:"center",vertical:"center"},border:bd})}
    for(let c=1+dim;c<NC;c++)set(r,c,{border:bd})}
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,MONTHT[month-1]+" "+year);
  XLSX.writeFile(wb,"vardiya_"+year+"-"+String(month).padStart(2,"0")+".xlsx")}

ay\u0131nla</button></div>";}h+="</div>";}h+="</div>";return h}

let _pdfFonts=null;
async function loadPdfFonts(){if(_pdfFonts)return _pdfFonts;const ab2b64=b=>{let s="";const u=new Uint8Array(b);const CH=0x8000;for(let i=0;i<u.length;i+=CH)s+=String.fromCharCode.apply(null,u.subarray(i,i+CH));return btoa(s)};const base="https://cdn.jsdelivr.net/npm/@expo-google-fonts/roboto@0.2.3/";const arr=await Promise.all([fetch(base+"Roboto_400Regular.ttf").then(x=>x.arrayBuffer()),fetch(base+"Roboto_700Bold.ttf").then(x=>x.arrayBuffer())]);_pdfFonts={reg:ab2b64(arr[0]),bold:ab2b64(arr[1])};return _pdfFonts}
function exportPDFOne(){exportPDF("one")}
function exportPDFAll(){exportPDF("all")}
async function exportPDF(scope){if(!window.jspdf){alert("PDF kutuphanesi yuklenemedi.");return}const list=scope==="one"?[selPerson]:staff.map((_,i)=>i);if(!list.length){alert("Personel yok.");return}let F;try{F=await loadPdfFonts()}catch(e){alert("Font yuklenemedi (internet?).");return}const J=window.jspdf.jsPDF;const doc=new J({unit:"pt",format:"a4"});doc.addFileToVFS("R.ttf",F.reg);doc.addFont("R.ttf","Roboto","normal");doc.addFileToVFS("RB.ttf",F.bold);doc.addFont("RB.ttf","Roboto","bold");list.forEach((idx,n)=>{if(n>0)doc.addPage();addPersonPage(doc,idx)});const fn=scope==="one"?("program_"+staff[selPerson].name.replace(/\s+/g,"_")+".pdf"):("vardiya_programlari_"+year+"-"+String(month).padStart(2,"0")+".pdf");doc.save(fn)}
function addPersonPage(doc,idx){const s=staff[idx];const p=personStats(s);const dim=daysInMonth(year,month);const nightKeys=cfg.shifts.filter(sh=>pmin(sh.end)<=pmin(sh.start)).map(sh=>sh.key);let night=0,wknd=0,izin=0;for(let d=0;d<dim;d++){const sh=shiftByVal(s._days[d]);const dow=new Date(year,month-1,d+1).getDay();if(sh){if(nightKeys.indexOf(sh.key)>=0)night++;if(dow===0||dow===6)wknd++}else izin++}const W=595,M=40;doc.setFillColor(47,75,124);doc.rect(0,0,W,74,"F");doc.setTextColor(255);doc.setFont("Roboto","bold");doc.setFontSize(18);doc.text(MONTHT[month-1]+" "+year+" \u00b7 Vardiya Program\u0131",M,40);doc.setFont("Roboto","normal");doc.setFontSize(10);doc.text("Hasi Elektronic",M,58);doc.setTextColor(30,37,48);doc.setFont("Roboto","bold");doc.setFontSize(16);doc.text(s.name+(s.role?"   \u00b7   "+s.role:""),M,104);doc.setFont("Roboto","normal");doc.setFontSize(10);doc.setTextColor(90,100,116);doc.text("Net "+p.net+"s   \u00b7   "+p.tot+" vardiya   \u00b7   "+night+" gece   \u00b7   "+wknd+" hafta sonu   \u00b7   "+izin+" izin",M,120);let y=140;const rowH=20,cN=M+8,cD=M+52,cV=M+150;doc.setFillColor(47,75,124);doc.rect(M,y,W-2*M,22,"F");doc.setTextColor(255);doc.setFont("Roboto","bold");doc.setFontSize(10);doc.text("G\u00fcn",cN,y+15);doc.text("G\u00fcn Ad\u0131",cD,y+15);doc.text("Vardiya",cV,y+15);y+=22;doc.setFontSize(9.5);for(let d=0;d<dim;d++){const dow=new Date(year,month-1,d+1).getDay();const v=s._days[d];const sh=shiftByVal(v);const wkend=(dow===0||dow===6);if(wkend)doc.setFillColor(244,242,237);else if(d%2)doc.setFillColor(247,248,250);else doc.setFillColor(255,255,255);doc.rect(M,y,W-2*M,rowH,"F");doc.setFont("Roboto","normal");doc.setTextColor(30,37,48);doc.text(String(d+1),cN,y+14);doc.setTextColor(90,100,116);doc.text(TRDAYL[dow],cD,y+14);let txt,col;if(sh){txt=sh.start+"-"+sh.end+"  ("+sh.label+")";col=sh.key==="S"?[37,107,67]:sh.key==="O"?[165,51,60]:[33,90,137]}else if(v==="YOK"){txt="M\u00fcsait de\u011fil";col=[150,155,165]}else if(v==="\u0130Z\u0130N"){txt="\u0130zin";col=[150,155,165]}else{txt="\u2014";col=[150,155,165]}doc.setTextColor(col[0],col[1],col[2]);doc.setFont("Roboto",sh?"bold":"normal");doc.text(txt,cV,y+14);y+=rowH}doc.setFont("Roboto","normal");doc.setFontSize(8);doc.setTextColor(150,155,165);doc.text("Hasi Elektronic \u00b7 Vardiya Planlay\u0131c\u0131 \u00b7 "+new Date().toLocaleDateString("tr"),M,822)}
function fstat(v,l){return "<div class='stat'><span class='sl'>"+l+"</span><b>"+v+"</b></div>"}
function renderFairness(){const dim=daysInMonth(year,month);const nightKeys=cfg.shifts.filter(sh=>pmin(sh.end)<=pmin(sh.start)).map(sh=>sh.key);const rows=staff.map((s,i)=>{const p=personStats(s);let night=0,wknd=0;for(let d=0;d<dim;d++){const sh=shiftByVal(s._days[d]);const dow=new Date(year,month-1,d+1).getDay();if(sh){if(nightKeys.indexOf(sh.key)>=0)night++;if(dow===0||dow===6)wknd++}}return {i:i,s:s,net:p.net,tot:p.tot,night:night,wknd:wknd}});rows.sort((a,b)=>b.net-a.net);const maxNet=Math.max.apply(null,[1].concat(rows.map(r=>r.net)));const nets=rows.map(r=>r.net),nights=rows.map(r=>r.night),wknds=rows.map(r=>r.wknd);const spread=a=>a.length?(Math.max.apply(null,a)-Math.min.apply(null,a)):0;const avg=a=>a.length?(a.reduce((x,y)=>x+y,0)/a.length):0;let h="<div class='navrow'><div class='lbl'>Denge / Adalet Raporu<small>"+monTitle()+" "+year+"</small></div></div>";h+="<div class='bar'>"+fstat(avg(nets).toFixed(0)+"s","ort. net saat")+fstat(spread(nets).toFixed(1)+"s","net fark (max-min)")+fstat(spread(nights),"gece fark\u0131")+fstat(spread(wknds),"hafta sonu fark\u0131")+"</div>";h+="<div class='fairtbl'><div class='fhead'><span>Personel</span><span>Net saat</span><span>Vardiya</span><span>Gece</span><span>H.sonu</span></div>";rows.forEach((r,idx)=>{const cls=idx===0?" hi":(idx===rows.length-1?" lo":"");h+="<div class='frow"+cls+"' onclick='selPerson="+r.i+";setView(\"person\")'><span class='fn'>"+avHtml(r.s.name)+esc(r.s.name)+(r.s.role?" <span class='roletag' style='background:"+roleColor(r.s.role)+"'>"+esc(r.s.role)+"</span>":"")+"</span><span class='fnet'><span class='fbar' style='width:"+Math.round(r.net/maxNet*100)+"%'></span><b>"+r.net+"s</b></span><span>"+r.tot+"</span><span>"+r.night+"</span><span>"+r.wknd+"</span></div>"});h+="</div>";document.getElementById("fairView").innerHTML=h}
